name: flutter_r_demo
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  r_dart_library: 1.0.2
#  r_dart_library:
#    path: /Users/York/公司历史/开源项目/r_dart_library

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/images/test_asset_variants/test_png_variant_1.png
    - assets/images/test_only_main_asset_1.png
    - packages/flutter_r_demo/assets/images/test_asset_variants/3x/variant-subdir/test_variant-subdir.png
    - packages/flutter_r_demo/assets/images/test_asset_variants/test_no_main_asset.png
    - packages/flutter_r_demo/assets/images/test_asset_variants/test_only_3x_variant.png
    - packages/flutter_r_demo/assets/images/test_asset_variants/test_only_main_asset_2.png
    - packages/flutter_r_demo/assets/images/test_asset_variants/test_png_variant_2.png
    - packages/flutter_r_demo/assets/images/test_bad_images/$_test_begin_with_character$.png
    - packages/flutter_r_demo/assets/images/test_bad_images/5_test_begin_with_number.png
    - packages/flutter_r_demo/assets/images/test_bad_images/C_test_begin_with_capitalize.png
    - packages/flutter_r_demo/assets/images/test_bad_images/_test_begin_with_character_.png
    - packages/flutter_r_demo/assets/images/test_bad_images/test_+-.·!@&$￥.png
    - packages/flutter_r_demo/assets/images/test_bad_images/test_UPPER_CASE.png
    - packages/flutter_r_demo/assets/images/test_bad_images/test_good_character.png
    - packages/flutter_r_demo/assets/images/test_same_asset_id/test_same_asset_id!.png
    - packages/flutter_r_demo/assets/images/test_same_asset_id/test_same_asset_id+.png
    - packages/flutter_r_demo/assets/images/test_same_asset_id/test_same_asset_id-.png
    - packages/flutter_r_demo/assets/images/test_same_asset_id/test_same_asset_id￥.png
    - packages/flutter_r_demo/assets/images/test_same_name/test_sameName.gif
    - packages/flutter_r_demo/assets/images/test_same_name/test_sameName.jpg
    - packages/flutter_r_demo/assets/images/test_same_name/test_sameName.png
    - packages/flutter_r_demo/assets/images/test_svg/3.0x/test_3.0x_svg.svg
    - packages/flutter_r_demo/assets/images/test_svg/test_svg.svg
    - packages/flutter_r_demo/flr.assets/images/test_jpg_variant/test_jpg_variant.jpg
    - packages/flutter_r_demo/flr.assets/images/test_no_main_asset/test_no_main_asset.png
    - packages/flutter_r_demo/flr.assets/images/test_only_1.5x_variant/test_only_1.5x_variant.png
    - packages/flutter_r_demo/flr.assets/images/test_only_main_asset_0/test_only_main_asset_0.png
    - packages/flutter_r_demo/flr.assets/images/test_png_variant_0/test_png_variant_0.png
    - assets/texts/test.txt
    - packages/flutter_r_demo/assets/texts/jsons/subdir/subsubdir/test_subsubdir.json
    - packages/flutter_r_demo/assets/texts/jsons/subdir/test_subdir.json
    - packages/flutter_r_demo/assets/texts/jsons/test.json
    - packages/flutter_r_demo/assets/texts/yamls/test.yaml
    - packages/flutter_r_demo/assets/texts/yamls/test_same_asset_id/test+.yaml
    - packages/flutter_r_demo/assets/texts/yamls/test_same_asset_id/test-.yaml
    - packages/flutter_r_demo/assets/texts/yamls/test_same_asset_id/test@.yaml
    - packages/flutter_r_demo/flr.assets/rawfiles/test_json.json
    - packages/flutter_r_demo/flr.assets/rawfiles/test_yaml.yaml

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
  fonts:
    - family: Amiri
      fonts:
        - asset: packages/flutter_r_demo/assets/fonts/Amiri/Amiri-Bold.ttf
        - asset: packages/flutter_r_demo/assets/fonts/Amiri/Amiri-BoldItalic.ttf
        - asset: packages/flutter_r_demo/assets/fonts/Amiri/Amiri-Italic.ttf
        - asset: packages/flutter_r_demo/assets/fonts/Amiri/Amiri-Regular.ttf
    - family: Baloo_Thambi_2
      fonts:
        - asset: assets/fonts/Baloo_Thambi_2/BalooThambi2-Bold.ttf
        - asset: assets/fonts/Baloo_Thambi_2/BalooThambi2-ExtraBold.ttf
        - asset: assets/fonts/Baloo_Thambi_2/BalooThambi2-Medium.ttf
        - asset: assets/fonts/Baloo_Thambi_2/BalooThambi2-Regular.ttf
        - asset: assets/fonts/Baloo_Thambi_2/BalooThambi2-SemiBold.ttf
    - family: Dan_Zhai_Hang_Shu_Cai
      fonts:
        - asset: packages/flutter_r_demo/assets/fonts/Dan_Zhai_Hang_Shu_Cai/Dan_Zhai_Hang_Shu_Cai.ttc
    - family: Liu_Jian_Mao_Cao
      fonts:
        - asset: assets/fonts/Liu_Jian_Mao_Cao/LiuJianMaoCao-Regular.ttf
    - family: Lobster
      fonts:
        - asset: assets/fonts/Lobster/Lobster-Regular.ttf
    - family: Pacifico
      fonts:
        - asset: packages/flutter_r_demo/assets/fonts/Pacifico/Pacifico-Regular.ttf
    - family: Sky_IconFont
      fonts:
        - asset: assets/fonts/Sky_IconFont/iconfont.ttf
    - family: YorkFish_IconFont
      fonts:
        - asset: packages/flutter_r_demo/assets/fonts/YorkFish_IconFont/iconfont.ttf
    - family: test_level_font
      fonts:
        - asset: packages/flutter_r_demo/assets/fonts/test_level_font/level1/level2/test_L2_font.ttf
        - asset: packages/flutter_r_demo/assets/fonts/test_level_font/level1/test_L1_font.ttf
        - asset: packages/flutter_r_demo/assets/fonts/test_level_font/test_level_font.ttf
flr:
  core_version: 3.2.0
  dartfmt_line_length: 80
  assets:
    - lib/assets/images
    - lib/assets/texts
    - assets/images
    - assets/texts
    - lib/flr.assets/images/test_jpg_variant
    - lib/flr.assets/images/test_no_main_asset
    - lib/flr.assets/images/test_only_1.5x_variant
    - lib/flr.assets/images/test_only_main_asset_0
    - lib/flr.assets/images/test_png_variant_0
    - lib/flr.assets/rawfiles
  fonts:
    - lib/assets/fonts
    - assets/fonts
